<!DOCTYPE HTML>
<html>

<head>
    {% include header.html %}
    <div class="sidenav">
        <ul>
            {% for item in site.data.navlist.navs %}
            <li><a href="{{ item.url }}">{{ item.title }}</a></li>



            {% endfor %}
        </ul>
    </div>
</head>

<body>
    <style>
        .sidenav {
            height: 100%;
            width: 160px;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            padding-top: 20px;
        }

        .sidenav a {
            padding: 6px 8px 6px 16px;
            text-decoration: none;
            font-size: 25px;
            color: #818181;
            display: block;
        }

        .sidenav a:hover {
            color: #f1f1f1;
        }

        a.image{
            height: 280px;
            width: 160px;
        }
    </style>

    {{ content }}

    {% include footer.html %}
</body>

</html>
